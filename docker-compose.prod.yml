# Production stack. Connects to the EXTERNAL shared Postgres (no local DB
# container). DB creds + Django secret are injected by the deploy workflow from
# GitHub Actions secrets; ALLOWED_HOSTS / CORS / POSTGRES_DB come from repo vars.
# See DEPLOY.md.
services:
  backend:
    image: patientia-backend:prod
    build:
      context: ./backend
      target: prod
    environment:
      DJANGO_ENV: prod
      DEBUG: "False"
      SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY}
      # Shared hosted Postgres.
      POSTGRES_DB: ${POSTGRES_DB:-patientia}
      POSTGRES_USER: ${SECRET_DB_USERNAME:?set SECRET_DB_USERNAME}
      POSTGRES_PASSWORD: ${SECRET_DB_PASSWORD:?set SECRET_DB_PASSWORD}
      POSTGRES_HOST: ${SECRET_DB_ADDRESS:?set SECRET_DB_ADDRESS}
      POSTGRES_PORT: ${SECRET_DB_PORT:-5432}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      # Google OAuth files mounted from ./secrets on the server.
      GOOGLE_CLIENT_SECRETS_PATH: /secrets/client_secrets.json
      GOOGLE_TOKEN_PATH: /secrets/token.json
    volumes:
      - ./secrets:/secrets
    restart: unless-stopped

  frontend:
    image: patientia-frontend:prod
    build:
      context: ./frontend
      target: prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
