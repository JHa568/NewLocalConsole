name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python manage.py check
      - run: pytest -q

  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc -b
      - run: npm run test
      - run: npm run build

  docker:
    name: Docker (build + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create backend .env for Docker build
        run: |
          cp backend/.env.example backend/.env
          sed -i 's/^SECRET_KEY=.*/SECRET_KEY=ci-test-secret-key/' backend/.env
          sed -i 's/^# DEBUG=False/DEBUG=False/' backend/.env
          sed -i 's/^# ALLOWED_HOSTS=localhost,127.0.0.1,backend/ALLOWED_HOSTS=localhost,127.0.0.1,backend/' backend/.env
          sed -i 's/^# CORS_ALLOWED_ORIGINS=http:\/\/localhost:8080/CORS_ALLOWED_ORIGINS=http:\/\/localhost:8080/' backend/.env
          sed -i 's/^# WEBAUTHN_ORIGIN=http:\/\/localhost:8080/WEBAUTHN_ORIGIN=http:\/\/localhost:8080/' backend/.env
          sed -i 's/^# SQLITE_NAME=data\/db.sqlite3/SQLITE_NAME=data\/db.sqlite3/' backend/.env
      - name: Build images
        run: docker compose build
      - name: Start stack and smoke-test
        run: |
          docker compose up -d
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health/; then
              echo "Health check passed"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/api/health/
          docker compose down

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: frontend
        run: npm run e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
