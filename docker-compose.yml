services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: patientia
      POSTGRES_USER: patientia
      POSTGRES_PASSWORD: patientia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patientia"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: patientia-backend:dev
    build:
      context: ./backend
      target: dev
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: patientia
      POSTGRES_USER: patientia
      POSTGRES_PASSWORD: patientia
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: patientia-frontend:dev
    build:
      context: ./frontend
      target: dev
    env_file:
      - ./frontend/.env
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
